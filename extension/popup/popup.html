<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PAPA PROXY</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div id="app">
    <!-- Main screen -->
    <section id="screen-main" class="screen" hidden>
      <header class="header">
        <div class="logo">🌐</div>
        <div class="header-text">
          <div class="title">PAPA PROXY</div>
          <div class="status" id="status-line">—</div>
        </div>
        <label class="toggle">
          <input type="checkbox" id="master-toggle" />
          <span class="slider"></span>
        </label>
        <button type="button" class="gear" id="open-settings" title="Settings">⚙</button>
        <button type="button" class="version-btn" id="open-version" title="Version">ℹ</button>
        <div class="lang-switch">
          <button type="button" class="lang-btn active" data-lang="en">EN</button>
          <button type="button" class="lang-btn" data-lang="ru">RU</button>
        </div>
      </header>

      <div class="rkn-banner" id="rkn-banner" hidden>
        <span class="rkn-icon">⚖</span>
        <span class="rkn-text" id="rkn-text"></span>
      </div>

      <section class="block">
        <div class="block-label">Routed services</div>
        <div class="preset-grid" id="preset-grid"></div>
      </section>

      <section class="block">
        <div class="block-label">Custom domains</div>
        <div class="custom-list" id="custom-list"></div>
        <form class="add-row" id="add-domain-form">
          <input type="text" id="add-domain-input" placeholder="example.com or *.example.com" autocomplete="off" />
          <button type="submit" id="add-domain-btn">+ Add</button>
        </form>
        <div class="error-text" id="add-domain-error" hidden></div>
      </section>

    </section>

    <!-- Settings screen -->
    <section id="screen-settings" class="screen" hidden>
      <header class="header">
        <button type="button" class="back" id="back-to-main" title="Back">←</button>
        <div class="header-text">
          <div class="title">Proxy settings</div>
        </div>
        <button type="button" class="test-all-btn" id="test-all-btn" title="Test all proxies">TEST ALL</button>
      </header>

      <!-- Proxy Groups -->
      <div id="proxy-groups"></div>

      <!-- TG Proxy Groups -->
      <div id="tg-proxy-groups"></div>

      <footer class="footer" id="settings-footer">
        <span class="dot ok"></span> Saved automatically
      </footer>
    </section>

    <!-- First-run screen -->
    <section id="screen-firstrun" class="screen" hidden>
      <header class="header">
        <div class="logo amber">🌐</div>
        <div class="header-text">
          <div class="title">PAPA PROXY</div>
          <div class="status amber">⚠ Setup needed</div>
        </div>
      </header>
      <section class="block centered">
        <div class="big-icon">⚙</div>
        <div class="cta-title">Connect a proxy to get started</div>
        <div class="cta-sub">Enter the host, port and auth of your<br />HTTP/SOCKS proxy.</div>
        <button type="button" class="cta" id="firstrun-open-settings">Open settings →</button>
      </section>
    </section>

    <!-- Version screen -->
    <section id="screen-version" class="screen" hidden>
      <header class="header">
        <button type="button" class="back" id="back-from-version" title="Back">←</button>
        <div class="header-text">
          <div class="title">Version info</div>
          <div class="version-in-header" id="current-version"></div>
        </div>
      </header>
      <section class="block">
        <div class="block-label">Changelog</div>
        <div class="changelog-list" id="changelog-list"></div>
      </section>
    </section>
  </div>

  <script type="module" src="popup.js"></script>
</body>
</html>
